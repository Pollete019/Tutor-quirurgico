<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutor Instrumental Quirúrgico — UB IL3</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue-dark: #0a3d6b;
    --blue-mid: #1565a8;
    --blue-light: #e8f2fb;
    --blue-lighter: #f0f7ff;
    --blue-border: #b3d4f0;
    --white: #ffffff;
    --gray-text: #374151;
    --gray-muted: #6b7280;
    --gray-light: #f3f4f6;
    --gray-border: #e5e7eb;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--blue-lighter);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 100%);
    color: white;
    padding: 0;
  }
  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-logo {
    width: 42px; height: 42px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-logo i { font-size: 22px; color: white; }
  .header-text h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .header-text p { font-size: 12px; opacity: 0.75; margin-top: 1px; }
  .header-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    display: none;
    white-space: nowrap;
  }

  /* MAIN CHAT */
  #chat-app {
    display: none;
    flex-direction: column;
    max-width: 960px;
    margin: 0 auto;
    width: 100%;
    height: calc(100vh - 74px);
    padding: 0;
  }
  /* QUICK BUTTONS */
  #quick-bar {
    padding: 10px 16px 6px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    background: white;
    border-bottom: 1px solid var(--blue-border);
  }
  .qbtn {
    font-size: 12px;
    padding: 5px 12px;
    border: 1px solid var(--blue-border);
    background: var(--blue-lighter);
    color: var(--blue-mid);
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    font-weight: 500;
  }
  .qbtn:hover { background: var(--blue-light); border-color: var(--blue-mid); }
  /* GALLERY TOGGLE */
  #gallery-bar {
    padding: 8px 16px;
    background: var(--blue-light);
    border-bottom: 1px solid var(--blue-border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #gallery-bar span { font-size: 12px; color: var(--blue-dark); font-weight: 500; }
  #gallery-toggle {
    font-size: 12px;
    padding: 4px 12px;
    border: 1px solid var(--blue-mid);
    background: white;
    color: var(--blue-mid);
    border-radius: 6px;
    cursor: pointer;
    margin-left: auto;
  }
  #gallery-toggle:hover { background: var(--blue-light); }
  /* GALLERY */
  #gallery-panel {
    display: none;
    padding: 12px 16px;
    background: white;
    border-bottom: 1px solid var(--blue-border);
    max-height: 200px;
    overflow-y: auto;
  }
  #gallery-panel.open { display: block; }
  .gallery-search {
    width: 100%;
    padding: 7px 12px;
    border: 1px solid var(--gray-border);
    border-radius: 7px;
    font-size: 13px;
    margin-bottom: 10px;
    outline: none;
  }
  .gallery-search:focus { border-color: var(--blue-mid); }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 8px;
  }
  .gallery-item {
    cursor: pointer;
    border: 2px solid transparent;
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.15s;
    background: var(--gray-light);
  }
  .gallery-item:hover { border-color: var(--blue-mid); }
  .gallery-item img { width: 100%; height: 65px; object-fit: cover; display: block; }
  .gallery-item-name {
    font-size: 9px;
    color: var(--blue-dark);
    text-align: center;
    padding: 3px 4px;
    line-height: 1.2;
    font-weight: 500;
  }
  /* MESSAGES */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: var(--blue-lighter);
  }
  .msg { display: flex; gap: 10px; max-width: 80%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }
  .msg-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
  }
  .msg.assistant .msg-avatar { background: var(--blue-mid); color: white; }
  .msg.user .msg-avatar { background: var(--blue-dark); color: white; }
  .msg-bubble {
    padding: 11px 15px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
  }
  .msg.assistant .msg-bubble {
    background: white;
    color: var(--gray-text);
    border-radius: 4px 14px 14px 14px;
    border: 1px solid var(--blue-border);
  }
  .msg.user .msg-bubble {
    background: var(--blue-mid);
    color: white;
    border-radius: 14px 4px 14px 14px;
  }
  .msg-img {
    border-radius: 10px;
    overflow: hidden;
    margin-top: 8px;
    border: 1px solid var(--blue-border);
  }
  .msg-img img { max-width: 200px; display: block; }
  .typing { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--blue-mid);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
  /* INPUT */
  #input-area {
    padding: 12px 16px;
    background: white;
    border-top: 1px solid var(--blue-border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #user-input {
    flex: 1;
    resize: none;
    border: 1px solid var(--blue-border);
    border-radius: 10px;
    padding: 10px 13px;
    font-size: 14px;
    font-family: inherit;
    color: var(--gray-text);
    background: var(--blue-lighter);
    min-height: 42px;
    max-height: 130px;
    line-height: 1.5;
    outline: none;
  }
  #user-input:focus { border-color: var(--blue-mid); background: white; box-shadow: 0 0 0 3px rgba(21,101,168,0.1); }
  #send-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--blue-mid);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #send-btn:hover { background: var(--blue-dark); }
  #send-btn:disabled { background: var(--gray-border); cursor: not-allowed; }
  #send-btn i { font-size: 17px; color: white; }
  /* ERROR BANNER */
  #err-banner {
    display: none;
    padding: 8px 16px;
    background: #fef2f2;
    border-bottom: 1px solid #fecaca;
    font-size: 12px;
    color: #dc2626;
  }
  #err-banner a { color: var(--blue-mid); cursor: pointer; text-decoration: underline; }
  /* SCROLLBAR */
  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--blue-border); border-radius: 3px; }
  @media (max-width: 600px) {
    .msg { max-width: 92%; }
    .header-text h1 { font-size: 14px; }
  }
  /* PROGRESS PANEL */
  #progress-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: background 0.15s;
  }
  #progress-btn:hover { background: rgba(255,255,255,0.25); }
  #progress-panel {
    display: none;
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 340px;
    background: white;
    border-left: 1px solid var(--blue-border);
    z-index: 100;
    flex-direction: column;
    box-shadow: -4px 0 20px rgba(0,0,0,0.1);
  }
  #progress-panel.open { display: flex; }
  .progress-header {
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 100%);
    color: white;
    padding: 16px 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .progress-header h3 { font-size: 15px; font-weight: 600; flex: 1; }
  .progress-close {
    background: none; border: none; color: white;
    font-size: 20px; cursor: pointer; line-height: 1;
    opacity: 0.8;
  }
  .progress-close:hover { opacity: 1; }
  .progress-body { flex: 1; overflow-y: auto; padding: 16px; }
  .progress-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray-muted);
    font-size: 14px;
    line-height: 1.6;
  }
  .progress-empty i { font-size: 36px; color: var(--blue-border); display: block; margin-bottom: 12px; }
  .progress-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--blue-lighter);
    border: 1px solid var(--blue-border);
    border-radius: 10px;
    padding: 12px 8px;
    text-align: center;
  }
  .stat-card .stat-num { font-size: 22px; font-weight: 700; color: var(--blue-dark); }
  .stat-card .stat-label { font-size: 10px; color: var(--gray-muted); margin-top: 2px; }
  .progress-section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 14px 0 8px;
  }
  .eval-card {
    background: white;
    border: 1px solid var(--gray-border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .eval-card-top {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
  }
  .eval-score {
    font-size: 18px; font-weight: 700;
    padding: 4px 10px;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .score-high { background: #dcfce7; color: #15803d; }
  .score-mid { background: #fef9c3; color: #a16207; }
  .score-low { background: #fee2e2; color: #dc2626; }
  .eval-meta { flex: 1; }
  .eval-tema { font-size: 13px; font-weight: 500; color: var(--gray-text); }
  .eval-date { font-size: 11px; color: var(--gray-muted); margin-top: 1px; }
  .eval-tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    margin: 2px 2px 0 0;
  }
  .tag-ok { background: #dcfce7; color: #15803d; }
  .tag-rep { background: #fee2e2; color: #dc2626; }
  .eval-detail { font-size: 12px; color: var(--gray-muted); line-height: 1.5; }
  .repaso-section {
    background: #fef3c7;
    border: 1px solid #fde68a;
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 4px;
  }
  .repaso-section h4 { font-size: 12px; font-weight: 600; color: #92400e; margin-bottom: 6px; }
  .repaso-item {
    font-size: 12px; color: #78350f;
    padding: 3px 0;
    border-bottom: 1px solid #fde68a;
  }
  .repaso-item:last-child { border-bottom: none; }
  .progress-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--gray-border);
  }
  .btn-clear {
    width: 100%;
    padding: 9px;
    background: white;
    color: #dc2626;
    border: 1px solid #fecaca;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-clear:hover { background: #fee2e2; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-logo"><i class="ti ti-scalpel"></i></div>
    <div class="header-text">
      <h1>Tutor Instrumental Quirúrgico</h1>
      <p>Màster en Infermeria Quirúrgica · UB IFContinua-IL3</p>
    </div>
    <span class="header-badge" id="mode-badge">—</span>
    <button id="progress-btn" onclick="toggleProgress()">
      <i class="ti ti-chart-bar" style="font-size:14px"></i> Mi progreso
    </button>
  </div>
</header>

<!-- PROGRESS PANEL -->
<div id="progress-panel">
  <div class="progress-header">
    <i class="ti ti-chart-bar" style="font-size:18px"></i>
    <h3>Mi progreso</h3>
    <button class="progress-close" onclick="toggleProgress()">x</button>
  </div>
  <div class="progress-body" id="progress-body">
    <div class="progress-empty">
      <i class="ti ti-clipboard-list"></i>
      Todavia no tienes evaluaciones registradas.<br>Completa el <strong>Modo 4</strong> para ver tu progreso aqui.
    </div>
  </div>
  <div class="progress-footer">
    <button class="btn-clear" onclick="clearProgress()">
      <i class="ti ti-trash" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>Borrar historial de progreso
    </button>
  </div>
</div>



<!-- CHAT -->
<div id="chat-app">
  <div id="err-banner">Error de conexión con el servicio. <a onclick="resetKey()">Reintentar</a></div>
  <div id="quick-bar">
    <button class="qbtn" onclick="sendQuick('menú')"><i class="ti ti-layout-grid" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>Menú</button>
    <button class="qbtn" onclick="sendQuick('1')">1 · Tutor</button>
    <button class="qbtn" onclick="sendQuick('2')">2 · Vicario</button>
    <button class="qbtn" onclick="sendQuick('3')">3 · Agente</button>
    <button class="qbtn" onclick="sendQuick('4')">4 · Evaluación</button>
    <button class="qbtn" onclick="sendQuick('5')">5 · Visual</button>
    <button class="qbtn" onclick="sendQuick('cambiar modo')"><i class="ti ti-refresh" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>Cambiar</button>
  </div>
  <div id="gallery-bar">
    <i class="ti ti-photo" style="font-size:14px;color:var(--blue-mid)"></i>
    <span>Banco visual · 50 instrumentos</span>
    <button id="gallery-toggle" onclick="toggleGallery()">Ver banco visual</button>
  </div>
  <div id="gallery-panel">
    <input class="gallery-search" type="text" placeholder="Buscar instrumento…" oninput="filterGallery(this.value)" />
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="user-input" placeholder="Escribe aquí o usa los botones de arriba…" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()"><i class="ti ti-arrow-up"></i></button>
  </div>
</div>

const INSTRUMENTS = [{"id": "Bulldogs", "name": "Clamps Bulldog", "grupo": "Hemostasia vascular", "desc": "Clamps vasculares pequeños de resorte. Sin anillas. Se aplican sobre vasos de pequeño calibre para oclusión temporal. Existen en diferentes tamaños. Rasgo diferencial: cuerpo estriado en acordeón y extremo en ángulo recto."}, {"id": "Cable_Bipolar", "name": "Cable Bipolar", "grupo": "Electrocoagulación", "desc": "Cable de coagulación bipolar. Conector de dos pines metálicos. Marcado con anillo rojo. La corriente pasa entre los dos brazos de la pinza sin atravesar al paciente. Más preciso y seguro que el monopolar."}, {"id": "Cable_Monopolar", "name": "Cable Monopolar", "grupo": "Electrocoagulación", "desc": "Cable de coagulación monopolar. Conector único tipo jack. La corriente atraviesa al paciente desde el instrumento hasta la placa de retorno. Cable gris. Usado con bisturí eléctrico y electrodos de corte y coagulación."}, {"id": "Canula_Yankauer", "name": "Cánula de Yankauer", "grupo": "Aspiración", "desc": "Cánula de aspiración rígida plástica curva. Punta roma con orificio lateral. Desechable, un solo uso. Para aspiración en cavidad oral y campo quirúrgico superficial. Longitud ~25-30 cm."}, {"id": "Canula_Irrigacion", "name": "Cánula de Irrigación", "grupo": "Irrigación", "desc": "Cánula metálica de irrigación. Tallo fino con angulación y base hexagonal roscada para conexión a jeringa. Para irrigar cavidades durante la cirugía. Reutilizable, acero inoxidable."}, {"id": "Disector", "name": "Disector", "grupo": "Disección", "desc": "Disector largo curvo con anillas. Mandíbulas muy finas y curvas con estrías en punta. Para disecar y rodear estructuras (vasos, conductos) antes de ligarlos. No confundir con disector de neurocirugía."}, {"id": "Pinza_Articulada", "name": "Pinza de Bayoneta / Articulada", "grupo": "Disección", "desc": "Pinza de disección sin anillas con doble angulación (bayoneta). Permite visualizar la zona sin que el mango bloquee la visión. Usada en neurocirugía y procedimientos nasales. La versión bipolar es la más usada para coagulación de precisión."}, {"id": "Pinzas_Laparoscopicas", "name": "Pinzas Laparoscópicas Karl Storz", "grupo": "Laparoscopia", "desc": "Pinzas laparoscópicas 5mm Karl Storz. Mango negro con anillas, botón de bloqueo y rotación 360°. Cuerpo cilíndrico negro. Extremos en Y. Permiten electrocoagulación monopolar. Se introducen por trocar de 5mm."}, {"id": "Portaagujas", "name": "Portaagujas con Tungsteno", "grupo": "Cierre/Sutura", "desc": "Portaagujas con anillas y mango dorados (tungsteno). Mandíbulas con placas de carburo de tungsteno que impiden que la aguja gire. Rasgo diferencial: color dorado de las anillas. La aguja se coloca en el primer tercio de la mandíbula."}, {"id": "Senn_Miller", "name": "Separador de Senn-Miller", "grupo": "Separación manual", "desc": "Separador manual doble extremo. Un extremo es valva plana de ángulo recto (romo), el otro son tres garfios afilados. Se usa por pares. Separadores superficiales en cirugía de cabeza y cuello."}, {"id": "Farabeuf", "name": "Separador de Farabeuf", "grupo": "Separación manual", "desc": "Separador manual en C/U de sección rectangular con extremos levemente curvados. Acero dorado. Se usa por pares. Uno de los separadores más básicos. Para separar suavemente planos blandos en cirugía general."}, {"id": "Roux", "name": "Separador de Roux", "grupo": "Separación manual", "desc": "Separador manual en S bivalva, más ancho y con mayor curvatura que el Farabeuf. Extremos en gancho semirredondeado hacia ambos lados. Mayor tracción en tejidos blandos. Se usa por pares en laparotomías."}, {"id": "Mosquito_recto", "name": "Mosquito Recto", "grupo": "Hemostasia", "desc": "Pinza de hemostasia pequeña recta (~12-14 cm). Mandíbulas con estrías transversales en toda su superficie. Sin dientes. Para oclusión de vasos de pequeño calibre y como fiador de hilos. No confundir con el mosquito curvo."}, {"id": "Foerster", "name": "Pinza de Foerster (Portatorundas)", "grupo": "Sujeción", "desc": "Pinza portatorundas Aesculap BF112R. Anillas asimétricas. Mandíbulas con estrías en zig-zag. Sin cremallera. Para montar torundas de gasa y desinfección inicial del campo quirúrgico."}, {"id": "Clamp_vascular", "name": "Clamp Vascular", "grupo": "Hemostasia vascular", "desc": "Clamp vascular de mandíbulas paralelas largas con estrías longitudinales atraumáticas. Para oclusión vascular sin dañar la pared del vaso. Tipo Cooley. La mordida longitudinal es el rasgo diferencial frente a hemostáticas estándar."}, {"id": "Castroviejo", "name": "Portaagujas de Castroviejo", "grupo": "Cierre/Sutura", "desc": "Portaagujas de microcirugía sin anillas, mango en resorte. Cremallera lateral de dientes finos. Mandíbulas muy finas. Para sutura con hilos de muy fino calibre (oftalmología, microcirugía). Rasgo diferencial: mango en lámina curva sin anillas."}, {"id": "Valva_Suprapubica", "name": "Valva Suprapúbica", "grupo": "Separación/Exposición", "desc": "Valva suprapúbica con gancho lateral de anclaje al separador de Balfour. Extremo en media luna cóncava amplia. Para cirugía abdominal baja (ginecología, urología), separando la pared suprapúbica y exponiendo la cavidad pélvica."}, {"id": "Mayo_recta", "name": "Tijera de Mayo Recta", "grupo": "Corte", "desc": "Tijera de Mayo recta con anillas doradas (tungsteno). Mandíbulas robustas y rectas, punta semirroma. Es la tijera del instrumentista: para cortar materiales no tisulares (suturas, gasas). No usar en tejido vivo. La curva se usa para tejido grueso."}, {"id": "Crile", "name": "Pinza de Crile", "grupo": "Hemostasia", "desc": "Pinza de hemostasia recta media (~14 cm). Punta fina. Mandíbulas cortas con estrías transversales en toda su superficie. Sin dientes. Más grande que el mosquito pero más delgada que la Kelly. Para vasos de calibre medio."}, {"id": "Mosquito_curvo", "name": "Mosquito Curvo", "grupo": "Hemostasia", "desc": "Pinza de hemostasia pequeña curva (~12 cm). Mandíbulas curvas con estrías transversales. Sin dientes. La curvatura facilita el acceso a zonas anguladas. Para oclusión de vasos de pequeño calibre. No confundir con el mosquito recto."}, {"id": "Kocher", "name": "Pinza de Kocher", "grupo": "Sujeción traumática", "desc": "Pinza de Kocher recta con dientes en la punta (1x2). Cremallera larga. Anillas doradas. Los dientes la hacen traumática: no usar en vasos ni vísceras. Para sujeción de tejidos resistentes, fascias e hilos gruesos."}, {"id": "Babcock", "name": "Pinza de Babcock", "grupo": "Sujeción atraumática", "desc": "Pinza de sujeción atraumática. Extremo en cazoleta triangular fenestrada. Mordida longitudinal. Sin dientes. Para sujeción de estructuras tubulares delicadas: intestino, trompa, apéndice. Disponible también en versión laparoscópica."}, {"id": "Duval", "name": "Pinza de Duval", "grupo": "Sujeción atraumática", "desc": "Pinza de sujeción atraumática con extremo triangular fenestrado (forma de delta). Sin dientes. Para vísceras muy delicadas: pulmón, intestino delgado. Más atraumática que la Babcock. Rasgo diferencial: extremo triangular vs cazoleta de Babcock."}, {"id": "Diseccion_dientes", "name": "Pinza de Disección con Dientes", "grupo": "Disección", "desc": "Pinza de disección larga con dientes (1x2). Sin anillas, se maneja como lápiz. Traumática. Para sujeción y disección de piel, fascia muscular y tejidos resistentes. Rasgo diferencial: punta con escalón dentado visible."}, {"id": "Adson_dientes", "name": "Pinza de Adson con Dientes", "grupo": "Disección", "desc": "Pinza de Adson con dientes. Punta muy fina y pequeña. Cuerpo estriado corto. Para disección de estructuras delicadas en cirugía plástica y procedimientos superficiales. Más pequeña y fina que la pinza estándar con dientes."}, {"id": "Sierra_Gigli", "name": "Sierra de Gigli", "grupo": "Corte óseo", "desc": "Sierra de alambre flexible trenzado con dos mangos en T. Corta hueso por fricción al mover los mangos alternativamente. Para craneotomía y amputaciones. Se pasa alrededor del hueso con aguja conductora."}, {"id": "Porta_Clips_Raney", "name": "Porta-Clips de Raney", "grupo": "Hemostasia neurocirugía", "desc": "Portaclips de Raney con clips azules de plástico. Se aplican sobre bordes del cuero cabelludo en neurocirugía para hemostasia cutánea. Los clips comprimen la galea y los vasos del cuero cabelludo."}, {"id": "Langenbeck", "name": "Separador de Langenbeck", "grupo": "Separación manual", "desc": "Separador manual con anilla de sujeción y extremo en gancho romo de ángulo recto. Mango plano. Más robusto que el Farabeuf. Para separar planos blandos en diferentes especialidades."}, {"id": "Craneostato", "name": "Craneostato", "grupo": "Fijación/Neurocirugía", "desc": "Sistema de fijación craneal autoestático con arco metálico fijado a mesa quirúrgica y pines que se anclan en el cráneo. Mantiene la cabeza completamente inmóvil durante la intervención. Permite ambas manos libres al cirujano."}, {"id": "Vaseloops", "name": "Vaseloops (Lazos Vasculares)", "grupo": "Control vascular", "desc": "Lazos de silicona de colores (azul, amarillo, rojo) para identificar y traccionar estructuras vasculares y nerviosas. Se pasan alrededor del vaso con un disector. Por convenio: azul para venas, rojo para arterias (varía según centro)."}, {"id": "Bayoneta", "name": "Pinza de Bayoneta", "grupo": "Disección", "desc": "Pinza de disección sin anillas con doble angulación tipo bayoneta. Permite trabajar en profundidad sin obstruir la visión. Usada en neurocirugía y rinología. La versión bipolar es la más utilizada para coagulación de precisión en cerebro."}, {"id": "Laminotomo", "name": "Laminótomo (Kerrison)", "grupo": "Corte óseo vertebral", "desc": "Pinza de Kerrison para corte de hueso vertebral y ligamentos. Mango con resorte de apertura automática. Extremo angulado con labio inferior que se desliza bajo la lámina. Disponible en diferentes ángulos y tamaños de mordida. Específica de cirugía de columna."}, {"id": "Garfio", "name": "Garfio / Separador de Israel", "grupo": "Separación manual", "desc": "Separador manual tipo rastrillo con mango en asa cerrada. Extremo con 6 dientes afilados. Traumático. Para separación y tracción de tejidos blandos con mayor agarre. En versión pequeña: garfio; en versión grande: separador de Israel o Volkman."}, {"id": "Verbrugge", "name": "Pinza de Verbrugge", "grupo": "Sujeción ósea", "desc": "Pinza de reducción ósea con mandíbulas anguladas y garfios curvados en la punta. Cremallera de posicionamiento. Para sujeción de fragmentos óseos fracturados durante la reducción antes de la osteosíntesis."}, {"id": "Harrington", "name": "Valva de Harrington", "grupo": "Separación/Exposición", "desc": "Valva abdominal profunda en forma de S con hoja ancha de curvatura pronunciada. Para retracción profunda en laparotomías: retrae vísceras y expone estructuras retroperitoneales. También protege el bazo durante cirugía gástrica."}, {"id": "Cortafrios", "name": "Cortafríos", "grupo": "Corte metálico", "desc": "Cortafríos quirúrgico robusto para cortar elementos metálicos: agujas de Kirschner, clavos de Steinmann, cerclajes. Más robusto que las tijeras de alambre. Mandíbulas de metal endurecido. No usar para cortar tejido."}, {"id": "Escoplo", "name": "Escoplo", "grupo": "Corte óseo", "desc": "Instrumento de percusión para corte óseo. Extremo biselado recto. Se golpea con mazo quirúrgico. Para cortar, cincelar y modelar hueso. La diferencia con la gubia es que el escoplo tiene filo recto y la gubia es cóncava."}, {"id": "Cucharilla", "name": "Cucharilla / Legra", "grupo": "Raspado", "desc": "Instrumento de raspado con extremo en cuchara. Filo en el borde, liso o serrado. Para raspar y extraer tejido de cavidades óseas, tejido de granulación. En ginecología (legra) para obtener endometrio o restos ovulares."}, {"id": "Gelpi", "name": "Separador de Gelpi", "grupo": "Separación automática", "desc": "Separador autoestático con dos brazos que terminan en un diente agudo. Cremallera lateral de bloqueo. Los dientes se enganchan en los bordes de la herida. Para cirugía de columna, cuello y procedimientos superficiales."}, {"id": "Maleolar", "name": "Pinza Maleolar", "grupo": "Sujeción ósea", "desc": "Pinza de reducción para cirugía maleolar. Mandíbulas anguladas con punta en gancho para fragmentos maleolares. Para sujetar el maléolo fracturado durante la reducción y colocación de tornillos de osteosíntesis."}, {"id": "Codevilla", "name": "Pinza de Codevilla", "grupo": "Sujeción ósea", "desc": "Pinza de reducción ósea similar a la de cangrejo pero con cremallera más larga que permite mantener la reducción bloqueada. Mandíbulas con garfios curvos. Para fracturas que requieren sujeción prolongada durante la osteosíntesis."}, {"id": "Omnitract", "name": "Separador Omnitract", "grupo": "Separación automática", "desc": "Sistema de retracción abdominal fijado a la mesa. Anillo central del que cuelgan múltiples valvas articuladas ajustables. Proporciona campo amplio y estable. Ideal en cirugía hepática y pancreática. Alternativa al separador de Herrera."}, {"id": "Gubia", "name": "Gubia", "grupo": "Corte óseo", "desc": "Para regularizar superficies óseas. Extremo en cucharilla con bordes filosos. Puede ser recta o angulada. Para extirpar fragmentos óseos y modelar superficies. A diferencia del escoplo, la gubia tiene mordida cóncava que recoge el fragmento."}, {"id": "Tijeras_alambre", "name": "Tijeras de Alambre", "grupo": "Corte metálico", "desc": "Tijeras con filo dentado para cortar suturas metálicas de acero. Mandíbulas cortas y anguladas. Sin anillas doradas. No usar en tejido biológico. Para cirugía torácica (cierre esternal con alambre) y ortopédica."}, {"id": "Finochietto", "name": "Separador de Finochietto", "grupo": "Separación torácica", "desc": "Separador autoestático específico para paredes del tórax. Dos ramas robustas con cremallera tipo trinquete. Para cirugía torácica y cardíaca (toracotomía). Rasgo diferencial: tamaño y robustez muy superiores a otros separadores."}, {"id": "Deaver", "name": "Valva de Deaver", "grupo": "Separación/Exposición", "desc": "Valva de separación abdominal profunda. Forma de media luna o riñón en el extremo activo. Hoja amplia y cóncava. Para retracción de vísceras y exposición de estructuras profundas en laparotomía. También llamada valva hepática."}, {"id": "Tijeras_laparoscopicas", "name": "Tijeras Laparoscópicas", "grupo": "Laparoscopia", "desc": "Tijeras laparoscópicas desechables con mango blanco, gatillo y anilla, cabeza naranja giratoria. Tallo negro de 5mm. Conectables a electrobisturí para corte y coagulación simultáneos. Permiten rotación 360°."}, {"id": "Microcirugía", "name": "Pinzas de Microcirugía", "grupo": "Microcirugía", "desc": "Pinzas de microcirugía sin anillas con mango plano estriado (se maneja como lápiz). Punta extremadamente fina. Para manipulación de estructuras bajo microscopio: anastomosis vasculares, suturas de nervios. Material: titanio o acero de alta precisión."}, {"id": "Satinsky", "name": "Clamp de Satinsky", "grupo": "Hemostasia vascular", "desc": "Clamp vascular de oclusión parcial. Mandíbulas largas con curvatura en S y estrías longitudinales atraumáticas. Permite pinzar parcialmente la pared de un vaso sin ocluirlo completamente. Para cirugía vascular y cardíaca. Rasgo diferencial: curvatura en S de las mandíbulas."}, {"id": "Periostotomo", "name": "Periostótomo", "grupo": "Despegue perióstico", "desc": "Para separar el periostio del hueso. Extremo plano-curvo con borde romo o ligeramente cortante. Se desliza entre el periostio y el córtex óseo con movimiento de palanca. Disponible en diferentes formas y tamaños."}];


const SYSTEM = `Eres un tutor especializado en instrumental quirúrgico para estudiantes del Máster en Enfermería Quirúrgica UB IFContinua-IL3.

IDIOMA: Responde siempre en español. Si el usuario escribe en catalán, responde en catalán. Tono clínico, docente, claro, riguroso y práctico.

BASE DE CONOCIMIENTO — INSTRUMENTAL QUIRÚRGICO (Ana Fernández Vargas, UB IL3):

DEFINICIÓN: La instrumentación quirúrgica es el arte y capacidad de participar en el acto quirúrgico, en el manejo del instrumental y accesorios necesarios. El instrumentista proporciona al cirujano el instrumento ideal para cada tiempo quirúrgico, garantiza la esterilidad del campo, realiza recuentos de instrumental y gasas, y retira el instrumental para su procesado.

COMPOSICIÓN: 75% acero inoxidable (aleación hierro-carbono con mínimo 12% cromo). El cromo aporta resistencia a la corrosión, el carbono dureza, el níquel el acabado pulido, el molibdeno la agudeza del filo. También: Titanio (microcirugía, inerte, no magnético, anodizado azul), Vitalio (cobalto-cromo-molibdeno, prótesis maxilofaciales), Carburo de tungsteno (filos de corte, ramas de portaagujas).

PARTES DEL INSTRUMENTO (cirugía convencional): Mandíbulas/ramas, Caja de traba/cierre, Mango, Cremalleras/trinquete, Asa en anillo. Tipos de mordida: con dientes (traumática), sin dientes con estriado transversal (más común), longitudinal, DeBakey, Cooley.

PARTES DEL INSTRUMENTO LAPAROSCÓPICO: Ramas, Cuerpo/eje cilíndrico (5 o 10mm), Mango ergonómico. Características: rotación 360°, posibilidad de electrocoagulación monopolar, mecanismo de bloqueo y cierre progresivo.

CLASIFICACIÓN POR GRUPOS:

1. INSTRUMENTAL DE CORTE: Bisturís (mango reutilizable + hoja desechable; mangos 3 y 7 usan hojas 10-15; mango 4 usa hojas 20-24). Tijeras: Mayo (robustas, planos gruesos; rectas=instrumentista, curvas=tejido), Metzenbaum (finas, planos blandos), Potts (mandíbulas anguladas 45°, tejido tubular vascular/biliar), Castroviejo (oftalmología/microcirugía), Stevens (mango largo, mandíbulas pequeñas, plástica), Laparoscópicas (conectables a electrobisturí), Alambre (filo dentado, suturas metálicas). Herramientas óseas: escoplos, gubias (cucharilla con bordes filosos), limas, sierras (Gigli), laminotomos (Kerrison), cortafríos (agujas K y Steinmann). Periostotomos, cucharillas/legras, instrumentos de biopsia.

2. INSTRUMENTAL DE DISECCIÓN: Pinzas de disección o mano izquierda (sin anillas): estándar con dientes (piel, fascia), sin dientes (tejidos blandos), Adson (estructuras delicadas, con/sin dientes), rusas (menos traumáticas, sujeción de agujas grandes), bayoneta (neurocirugía/nasal/bipolar), DeBakey (cirugía vascular, intestinal), microcirugía. Disectores (diferentes curvaturas para disecar y ligar). Disección roma (torundas montadas, mangos de bisturí).

3. INSTRUMENTAL DE SUJECIÓN: Atraumáticas: Allis (curvatura hacia dentro + fila de dientes romos), Babcock (cazoleta para tubo digestivo, mordida longitudinal), Duval (extremo triangular, vísceras muy delicadas). Traumáticas: campo (en desuso, fijación de tallas), cangrejo (reducción de fracturas), Codevilla (como cangrejo con cremallera más larga), portatorundas (Foerster), Pean, Kocher (rectas y curvas con dientes), hueso: Hernández Ross, Verbrugge, maleolar.

4. INSTRUMENTAL DE EXPOSICIÓN Y RETRACCIÓN: Manuales (a pares): Farabeuf, Roux, Langenbeck, garfios, Senn-Miller, Israel/Volkman, valvas abdominales (Doyen, Deaver/hepática, Harrington, maleable). Automáticos: ortostáticos/autoestáticos (cremalleras, puntas romas o afiladas), Balfour (bivalvo + valva suprapúbica), Gosset, Herrera/Omnitract (barras a mesa, cirugía hepática), Finochietto (tórax/cardíaca), Gelpi (columna/cuello, dos dientes terminales).

5. INSTRUMENTAL DE CIERRE: Portaagujas: punta fina para agujas pequeñas, punta gruesa para agujas mayores. Superficies internas: placas de carburo de tungsteno (punta de diamante, anillas doradas), estriación cruzada, estriación lisa (plástica). Castroviejo (microcirugía, mango resorte sin anillas). Sutura mecánica: grapadoras (anastomosis, cierre hermético). Agujas: traumáticas (triangulares), atraumáticas (circulares).

6. INSTRUMENTAL DE ASPIRACIÓN: Cánula Yankauer (desechable, curva, punta roma). Terminal multiperforado (grandes volúmenes en espacio abdominal). Aspirador de succión controlada (abertura en mango, diferentes grosores y angulaciones). Todos conectan a dispositivo de vacío con regulador.

7. INSTRUMENTAL DE HEMOSTASIA: Pinzas hemostáticas (sin dientes): Mosquito (curvo o recto, pequeño, estrías en toda la superficie), Crile (punta fina, mandíbulas cortas y curvas, estrías en toda la superficie), Kelly (algo más gruesa que Crile, mandíbulas más largas, estrías en mitad de la superficie), Bengolea (larga, planos profundos, mandíbulas curvas, estrías en toda la superficie), Kocher hemostática (sin dientes, mandíbulas fuertes para hilos). Pinzas oclusivas: clamps intestinales (blandos, dibujo longitudinal), clamps vasculares: DeBakey, Satinsky (oclusión parcial, mandíbulas en S), Lees, Cooley, Bulldogs, Klintmann/Rolex.

GESTIÓN EN QUIRÓFANO: La instrumentista monta las mesas quirúrgicas siguiendo el orden de los tiempos quirúrgicos. Verifica esterilidad (marcadores químicos), recuenta el instrumental al inicio y al cierre de cavidades, mantiene el instrumental limpio con agua destilada (no suero fisiológico, que acelera la corrosión). Realiza recuento al relevo de personal.

MESAS QUIRÚRGICAS: Mesa de Mayo (activa, instrumental en uso), mesa soberana/auxiliar (pasiva, resto de instrumental). Distribución básica: instrumental de acceso/incisión (bisturí, tijeras, separadores) → hemostasia → disección → exposición → cierre. Custom packs: material personalizado para cada tipo de cirugía.

CIRUGÍA MAYOR: Mínimo dos mesas (Mayo + soberana). Avances: sutura mecánica, Ligasure, Enseal, Ultracisión, Cavitron/Cusa, hidrodisectores.
CIRUGÍA ORTOPÉDICA: Varias mesas soberanas para componentes de prótesis. Material según zona anatómica (base grande/media/mano) + material específico por prótesis.
MICROCIRUGÍA: Mesa separada para instrumental microquirúrgico, lejos del instrumental burdo.
LAPAROSCOPIA SENCILLA: Una mesa soberana (zona pequeña para base convencional + trocares; zona mayor para pinzas laparoscópicas).
LAPAROSCOPIA COMPLEJA: Mesa soberana laparoscópica + mesa Mayo para coagulación/aspiración + mesa tipo Mayo para tiempo asistido.

MATERIALES ESPECIALES: Vaseloops (lazos de silicona de colores para identificar estructuras vasculares y nerviosas). Porta-clips de Raney (clips azules para hemostasia del cuero cabelludo en neurocirugía). Craneostato (fijación craneal con pines para neurocirugía). Sierra de Gigli (alambre trenzado con mangos en T para craneotomía y amputaciones). Laminótomo de Kerrison (corte de hueso vertebral en cirugía de columna).

MANTENIMIENTO: Vida media ~10 años. Separar metales diferentes para evitar depósito electrolítico. Usar agua destilada (no suero salino) durante la intervención. Desmontar instrumentos articulados para su procesado. En central de esterilización: inspección de limpieza, función, defectos, filo y alineación. Cajas máximo 16 kg. Objetos pesados abajo, delicados y cortantes arriba. Pasivación: capa de óxido de cromo que protege la superficie.

DIFERENCIAS CLAVE ENTRE INSTRUMENTOS SIMILARES (para el modo evaluación):
- Mosquito vs Crile vs Kelly: tamaño creciente; estrías en toda la superficie (Mosquito y Crile) vs mitad (Kelly)
- Babcock vs Duval: cazoleta (Babcock) vs triángulo (Duval); Duval más atraumática
- Mayo recta vs curva: recta=instrumentista (no tejido), curva=tejido grueso
- Portaagujas estándar vs Castroviejo: anillas (estándar) vs mango resorte sin anillas (Castroviejo=microcirugía)
- Farabeuf vs Roux: Farabeuf más pequeño en C, Roux más ancho en S bivalva
- Clamp vascular vs hemostática: estrías longitudinales (vascular, atraumático) vs transversales (hemostática)
- Escoplo vs gubia: filo recto (escoplo) vs cucharilla cóncava (gubia)
- Separador Gelpi vs autoestático estándar: Gelpi tiene dientes que se enganchan en bordes herida

REGLAS DE ACTIVACIÓN Y MODOS:
Al iniciar muestra EXACTAMENTE este menú:
---
TUTOR INSTRUMENTAL QUIRÚRGICO
Sistema portable de entrenamiento clínico

Bienvenido/a al Tutor de Instrumental Quirúrgico.

Elige cómo quieres trabajar hoy:
1. MODO TUTOR — Escenario clínico y diálogo socrático.
2. MODO VICARIO — Observas un debate clínico entre profesionales.
3. MODO AGENTE — Tú haces de profesora y corriges a un residente.
4. MODO EVALUACIÓN — Test con feedback inmediato y puntuación final.
5. MODO IDENTIFICACIÓN VISUAL — Reconocimiento de instrumental a partir de imágenes.

Comandos: escribe 1-5 para entrar directamente, "menú" para volver al menú, "cambiar modo" para cambiar.
---

MODO 1 — TUTOR SOCRÁTICO: Presenta escenario clínico breve en quirófano con decisión sobre instrumental. Pregunta semilla abierta. No des la solución inmediata. Usa preguntas orientadoras. Si se estanca, da pista. Si responde bien, profundiza.

MODO 2 — VICARIO: Personajes: Dra. Fonseca (cirujana senior rigurosa), Álex (residente con errores plausibles), Carmen (enfermera instrumentista práctica). Presenta situación. Álex dice algo erróneo. Carmen o Dra. Fonseca lo cuestionan. El debate lleva a la respuesta correcta. Cierra con resumen didáctico.

MODO 3 — AGENTE: Álex plantea una duda con un error. El alumno responde como docente. Reacciona como Álex según la calidad de la explicación. Si el alumno deja pasar un error, Álex lo acepta ingenuamente. Al terminar: feedback (qué explicó bien, qué matizaría, qué error pasó por alto).

MODO 4 — EVALUACIÓN: Pregunta el tema o propón uno basado en el material. Genera 5 preguntas tipo test con 4 opciones ABCD. Presenta una por una. Corrige con pista en primer fallo, solución en segundo. Puntuación final X/5 con qué domina y qué debe repasar.

MODO 5 — IDENTIFICACIÓN VISUAL: El sistema tiene un banco de 50 imágenes reales de instrumental. Presenta imágenes al alumno y pregunta qué instrumento es. Alterna entre respuesta libre ("¿Qué instrumento es este? ¿Qué rasgo diferencial te lo indica?") y multiopción (4 opciones del mismo grupo funcional). Si acierta: confirma con 1-2 claves diferenciales. Si falla: da pista visual. Si falla otra vez: revela y explica el diferencial.

REGLA FUNDAMENTAL: Trabaja SOLO con el material de la base de conocimiento anterior. Si se pregunta algo fuera de este material responde: "Eso va más allá del material disponible; centrémonos en lo que tenemos."
`;

// ⬇️ PON AQUÍ LA URL DE TU CLOUDFLARE WORKER
const WORKER_URL = 'https://tutor-quirurgico.ana-fernandez.workers.dev';
let history = [];
let currentMode = null;
let isLoading = false;

const modeNames = {'1':'Modo Tutor','2':'Modo Vicario','3':'Modo Agente','4':'Modo Evaluación','5':'Modo Visual'};

function init() {
  buildGallery();
  const inp = document.getElementById('user-input');
  inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  inp.addEventListener('input', () => { inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 130) + 'px'; });
  showChat();
  callClaude('iniciar tutor instrumental');
}

function saveKey() { showChat(); callClaude('iniciar tutor instrumental'); }
function resetKey() { document.getElementById('err-banner').style.display = 'none'; history = []; callClaude('iniciar tutor instrumental'); }

function showChat() {
  document.getElementById('chat-app').style.display = 'flex';
}

function buildGallery() {
  const grid = document.getElementById('gallery-grid');
  INSTRUMENTS.forEach(inst => {
    if (!IMAGES[inst.id]) return;
    const el = document.createElement('div');
    el.className = 'gallery-item';
    el.dataset.name = inst.name.toLowerCase();
    el.innerHTML = `<img src="${IMAGES[inst.id]}" alt="${inst.name}" loading="lazy"><div class="gallery-item-name">${inst.name}</div>`;
    el.onclick = () => sendWithImage(inst);
    grid.appendChild(el);
  });
}

function filterGallery(q) {
  document.querySelectorAll('.gallery-item').forEach(el => {
    el.style.display = el.dataset.name.includes(q.toLowerCase()) ? '' : 'none';
  });
}

function toggleGallery() {
  const panel = document.getElementById('gallery-panel');
  const btn = document.getElementById('gallery-toggle');
  panel.classList.toggle('open');
  btn.textContent = panel.classList.contains('open') ? 'Cerrar banco visual' : 'Ver banco visual';
}

function sendWithImage(inst) {
  const msgs = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg user';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = 'Tú';
  const content = document.createElement('div');
  content.innerHTML = `<div class="msg-bubble">Identifica este instrumento:</div><div class="msg-img"><img src="${IMAGES[inst.id]}" style="max-width:180px"></div>`;
  wrapper.appendChild(avatar);
  wrapper.appendChild(content);
  msgs.appendChild(wrapper);
  msgs.scrollTop = msgs.scrollHeight;
  
  const userMsg = `El alumno está mirando una imagen del banco visual. El instrumento en la imagen es: "${inst.name}" (grupo: ${inst.grupo}). Descripción: ${inst.desc}. Ahora, según el modo activo: si estamos en Modo 5 (Identificación Visual), formula la pregunta de identificación sin revelar el nombre. Si estamos en otro modo, integra este instrumento en el diálogo actual de forma natural.`;
  callClaude(userMsg);
}

function addMsg(role, text, imgSrc) {
  const msgs = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'assistant' ? 'TI' : 'Tú';
  const content = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  content.appendChild(bubble);
  if (imgSrc) {
    const imgDiv = document.createElement('div');
    imgDiv.className = 'msg-img';
    imgDiv.innerHTML = `<img src="${imgSrc}" style="max-width:200px">`;
    content.appendChild(imgDiv);
  }
  wrapper.appendChild(avatar);
  wrapper.appendChild(content);
  msgs.appendChild(wrapper);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const w = document.createElement('div');
  w.className = 'msg assistant'; w.id = 'typing-ind';
  const av = document.createElement('div'); av.className = 'msg-avatar'; av.textContent = 'TI';
  const b = document.createElement('div'); b.className = 'msg-bubble typing';
  b.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  w.appendChild(av); w.appendChild(b);
  msgs.appendChild(w); msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() { const t = document.getElementById('typing-ind'); if (t) t.remove(); }

function detectMode(text) {
  const t = text.trim();
  if (t === '1' || /modo tutor/i.test(t)) return '1';
  if (t === '2' || /vicario/i.test(t)) return '2';
  if (t === '3' || /agente/i.test(t)) return '3';
  if (t === '4' || /evaluaci/i.test(t)) return '4';
  if (t === '5' || /visual/i.test(t)) return '5';
  if (/men[uú]/i.test(t) || /cambiar modo/i.test(t)) return null;
  return currentMode;
}

function updateBadge(mode) {
  const badge = document.getElementById('mode-badge');
  if (mode && modeNames[mode]) { badge.textContent = modeNames[mode]; badge.style.display = 'block'; }
  else { badge.style.display = 'none'; }
}

async function callClaude(userText, skipDisplay) {
  if (isLoading) return;
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  if (!skipDisplay) addMsg('user', userText);
  
  // Construir historial en formato Gemini
  const geminiHistory = history.map(function(m) {
    return { role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] };
  });
  geminiHistory.push({ role: 'user', parts: [{ text: userText }] });
  
  history.push({ role: 'user', content: userText });
  currentMode = detectMode(userText);
  updateBadge(currentMode);
  showTyping();
  
  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: SYSTEM }] },
        contents: geminiHistory,
        generationConfig: { maxOutputTokens: 1200, temperature: 0.7 }
      })
    });
    const data = await resp.json();
    hideTyping();
    if (data.error) {
      console.error('Gemini API error:', JSON.stringify(data.error));
      const isAuth = data.error.code === 400 || data.error.code === 403;
      if (isAuth) document.getElementById('err-banner').style.display = 'block';
      addMsg('assistant', 'Error API: ' + data.error.message + ' (código ' + data.error.code + ')');
    } else {
      const reply = data.candidates[0].content.parts.map(function(p){ return p.text || ''; }).join('');
      history.push({ role: 'assistant', content: reply });
      currentMode = detectMode(userText);
      updateBadge(currentMode);
      addMsg('assistant', reply);
      if (currentMode === '4') detectEvalResult(reply);
    }
  } catch(e) {
    hideTyping();
    console.error('Error Gemini:', e);
    addMsg('assistant', 'Error de conexión: ' + e.message);
  }
  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

function sendMessage() {
  const inp = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text || isLoading) return;
  inp.value = ''; inp.style.height = 'auto';
  callClaude(text);
}

function sendQuick(text) {
  if (isLoading) return;
  callClaude(text);
}

function detectEvalResult(text) {
  const match = text.match(/(\d)\/5/);
  if (match) {
    const score = parseInt(match[1]);
    try {
      const scores = JSON.parse(localStorage.getItem('tiq_scores') || '[]');
      scores.push({ date: new Date().toLocaleDateString('es-ES'), score });
      localStorage.setItem('tiq_scores', JSON.stringify(scores));
    } catch(e) { console.warn('localStorage no disponible:', e); }
  }
}

init();
</script>
</body>
</html>
